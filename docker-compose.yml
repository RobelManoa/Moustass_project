services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: moustass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:password@mysql:3306/moustass
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - mysql

volumes:
  mysql_data: