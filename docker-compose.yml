services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: moustass
    ports:
      - "3307:3306"          
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://root:password@mysql:3306/moustass
      PORT: 3001
      ENABLED_MODULES: auth,user, video,license
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules          
      - /app/dist
      - ./storage:/app/storage  
      - ./.env:/app/.env
    command: sh -c "npm install && npx prisma generate && npm run dev"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: