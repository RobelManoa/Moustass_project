name: CI/CD

on:
  push:
    branches:
      - backend
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quality:
    name: Build, Tests and Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Build
        run: npm run build

      # Upload coverage reports pour SonarQube
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/cobertura-coverage.xml
          if-no-files-found: warn   # changé en warn pour ne pas casser le workflow si coverage vide

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important pour l'historique et les PR

      # Téléchargement des rapports de coverage depuis le job quality
      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}